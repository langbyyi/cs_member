# 应用配置示例
# 复制此文件为 application.yml 并填入实际值

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

spring:
  application:
    name: cs-member
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cs_member?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: YOUR_DB_PASSWORD
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: smtp.qq.com
    port: 587
    username: YOUR_EMAIL@qq.com
    password: YOUR_SMTP_AUTH_CODE
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: caffeine
    cache-names: users,roles,permissions
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=30m

  springdoc:
    api-docs:
      enabled: true
      path: /v3/api-docs
    swagger-ui:
      enabled: true
      path: /swagger-ui.html
      operations-sorter: method
      tags-sorter: alpha

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cloud.hilang.cs_member.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    auto-mapping-behavior: partial
    auto-mapping-unknown-column-behavior: warning
    default-executor-type: simple
    default-statement-timeout: 25
    default-fetch-size: 100
    safe-row-bounds-enabled: false
    local-cache-scope: session
    jdbc-type-for-null: other
    lazy-load-trigger-methods: equals,clone,hashCode,toString
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      table-underline: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  auto-runtime-dialect: true
  params: count=countSql;pageNum=pageNum;pageSize=pageSize;reasonable=reasonable;pageSizeZero=pageSizeZero

jwt:
  member:
    secret: YOUR_MEMBER_JWT_SECRET
    expiration: 7200000
    refresh-expiration: 604800000
    token-prefix: Bearer
    header-name: Authorization
    token-type: MEMBER
    user-id-claim: memberId
    username-claim: memberNo
    phone-claim: phone
    memberno-claim: memberNo
  admin:
    secret: YOUR_ADMIN_JWT_SECRET
    expiration: 7200000
    refresh-expiration: 604800000
    token-prefix: Bearer
    header-name: Authorization
    token-type: ADMIN
    user-id-claim: userId
    username-claim: username
    phone-claim: phone
    roles-claim: roles
    permissions-claim: permissions
  common:
    max-login-attempts: 5
    lock-time-minutes: 30
    remember-me: false
    renewal-threshold: 600000
    redis-token-prefix: "jwt:token:"
    redis-refresh-prefix: "jwt:refresh:"
    redis-login-failure-prefix: "login:failure:"
    redis-account-lock-prefix: "account:lock:"
    redis-admin-token-prefix: "jwt:admin:token:"
    redis-admin-refresh-prefix: "jwt:admin:refresh:"

logging:
  level:
    root: INFO
    cloud.hilang.cs_member: INFO
    cloud.hilang.cs_member.mapper: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/cs-member.log
    max-size: 10MB
    max-history: 30
